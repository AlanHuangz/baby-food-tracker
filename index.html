<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>木岑的副食品日記 🌲</title>
  <style>
    :root {
      --bg-color: #F4F9F4; --primary-color: #5C8D89; --secondary-color: #A7D7C5; 
      --text-color: #4A4A4A; --wood-border: #D5C2A5; --danger-color: #E07A5F;
    }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; padding-bottom: 70px; display: flex; flex-direction: column; align-items: center; }
    .app-container { width: 100%; max-width: 420px; background: white; border-radius: 25px; box-shadow: 0 10px 20px rgba(92, 141, 137, 0.15); padding: 20px; box-sizing: border-box; }
    
    /* 頁籤切換 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* 底部導覽列 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; border-top-left-radius: 20px; border-top-right-radius: 20px; }
    .nav-btn { background: none; border: none; font-size: 1rem; color: #999; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .nav-btn.active { color: var(--primary-color); }
    
    /* 月曆區塊 */
    .cute-calendar { background-color: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 2px solid var(--secondary-color); }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cal-title { font-weight: bold; color: var(--primary-color); font-size: 1.1rem; }
    .cal-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; transition: transform 0.2s; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.8rem; color: #7B9D96; font-weight: bold; margin-bottom: 5px; }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-day { min-height: 55px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; border-radius: 12px; font-size: 0.9rem; cursor: pointer; color: var(--text-color); padding-top: 5px; box-sizing: border-box; }
    .cal-day.selected { background-color: var(--primary-color); color: white; font-weight: bold; }
    .cal-day.today { border: 2px dashed var(--primary-color); }
    
    /* 食物迷你小標籤 */
    .food-tag { font-size: 0.55rem; background-color: #EBF4EE; color: #386662; border: 1px solid var(--secondary-color); border-radius: 4px; padding: 2px; margin-top: 2px; width: 90%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .selected .food-tag { background-color: white; color: var(--primary-color); border: none; }
    .food-tag.new-food { background-color: #FFEEDD; color: #D48843; border-color: #FFDDAA; font-weight: bold; }
    .selected .food-tag.new-food { background-color: #FFF; color: #D48843; }

    /* 表單區塊 */
    .record-section h3 { margin-top: 0; color: var(--primary-color); text-align: center; }
    .date-display { text-align: center; font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; color: #5C4B43; }
    
    .meal-block { background: #FCFCFA; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px dashed var(--wood-border); position: relative;}
    .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .btn-remove-meal { background: #FFE3E3; color: var(--danger-color); border: none; border-radius: 8px; padding: 4px 8px; font-size: 0.75rem; font-weight: bold; }
    
    .input-group { margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    select, input { border: 1px solid var(--wood-border); border-radius: 8px; padding: 8px; color: var(--text-color); flex-grow: 1; background-color: white;}
    
    .btn { background-color: var(--primary-color); color: white; border: none; border-radius: 12px; padding: 10px 15px; font-weight: bold; cursor: pointer; width: 100%;}
    .btn-add-food { background-color: var(--secondary-color); color: #2C4A47; padding: 5px 10px; font-size: 0.8rem; border: none; border-radius: 8px; font-weight: bold; width: auto; margin-top: 5px;}
    .btn-action { background-color: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 0;}
    .btn-allergy { filter: grayscale(100%); opacity: 0.5; transition: 0.2s;}
    .btn-allergy.active { filter: grayscale(0%); opacity: 1; }
    
    /* 統計分頁樣式 */
    .stats-header { text-align: center; margin-bottom: 20px; }
    .progress-ring-container { position: relative; width: 150px; height: 150px; margin: 0 auto 10px; display: flex; justify-content: center; align-items: center; background: conic-gradient(var(--primary-color) 0%, #E0E0E0 0%); border-radius: 50%; }
    .progress-inner { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .progress-num { font-size: 2rem; font-weight: bold; color: var(--primary-color); }
    
    .stats-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-item { background: #F8FBF8; border: 1px solid var(--secondary-color); border-radius: 10px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;}
    .stat-item.allergy { border-color: var(--danger-color); background: #FFF3F3; }
    
    /* 載入中遮罩 */
    #loading { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 249, 244, 0.9); justify-content: center; align-items: center; font-size: 1.2rem; color: var(--primary-color); font-weight: bold; z-index: 1000; flex-direction: column; }
  </style>
</head>
<body>

<div id="loading"><span>🌲 讀取木岑的資料中...</span></div>

<div id="tab-diary" class="app-container tab-content active">
  <div class="cute-calendar">
    <div class="cal-header">
      <button class="cal-btn" onclick="changeMonth(-1)">🌿</button>
      <div class="cal-title" id="monthYear"></div>
      <button class="cal-btn" onclick="changeMonth(1)">🌿</button>
    </div>
    <div class="cal-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>

  <div class="record-section">
    <h3>🪵 木岑的副食品紀錄 🌲</h3>
    <div class="date-display" id="displayDate"></div>
    <div style="font-size: 0.8rem; color:#888; text-align:center; margin-bottom:10px;">可直接修改內容並儲存，將會覆蓋當日舊紀錄</div>
    
    <div id="mealsContainer"></div>
    <button class="btn" style="background: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); margin-bottom: 15px;" onclick="addMealBlock()">+ 新增一餐</button>
    <button class="btn" onclick="submitData()">儲存當日紀錄 🌿</button>
  </div>
</div>

<div id="tab-stats" class="app-container tab-content">
  <div class="stats-header">
    <h3 style="color: var(--primary-color);">🏆 一歲前 100 種挑戰</h3>
    <div class="progress-ring-container" id="progressRing">
      <div class="progress-inner">
        <div class="progress-num" id="progressNum">0</div>
        <div style="font-size: 0.8rem; color: #888;">/ 100 種</div>
      </div>
    </div>
    <p style="font-size:0.9rem; color:#666;">記錄包含吃過次數與過敏狀況</p>
  </div>
  <div class="stats-list" id="statsListContainer"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-diary" onclick="switchTab('diary')"><span>📖</span>日記</button>
  <button class="nav-btn" id="nav-stats" onclick="switchTab('stats')"><span>📊</span>百種挑戰</button>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwYMNAkHPIV4WpdxoHngCHnUFSO3l8wDM_eFplbKGFzABKW74lMSqeKCLW16a80_Fgo/exec"; 

  let currentDate = new Date();
  let selectedDate = new Date();
  let foodRecords = {}; 
  let foodStats = {}; // 統計每種食物的資訊 { "地瓜": { count: 3, firstDate: "2026-04-03", allergy: false } }
  
  // 記錄當下畫面上編輯的這天所有的餐點，方便整天存檔
  let currentDayMealsData = []; 

  async function fetchHistoryData() {
    try {
      const response = await fetch(GAS_URL + "?t=" + new Date().getTime());
      const data = await response.json();
      foodRecords = data;
      calculateStats(); // 計算統計與初次體驗日
    } catch (error) { console.log("讀取失敗"); }
    
    document.getElementById('loading').style.display = 'none';
    renderCalendar();
    selectDate(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate());
    renderStats();
  }

  // 計算每個食物的次數與「第一次吃」的日期
  function calculateStats() {
    foodStats = {};
    for (let date in foodRecords) {
      foodRecords[date].forEach(meal => {
        meal.foods.forEach(food => {
          let fName = food.name.trim();
          if(!fName) return;
          if (!foodStats[fName]) {
            foodStats[fName] = { count: 0, firstDate: date, allergy: false };
          }
          foodStats[fName].count++;
          // 找尋最早的日期
          if (new Date(date) < new Date(foodStats[fName].firstDate)) {
            foodStats[fName].firstDate = date;
          }
          // 如果有任何一次標記過敏，這項食物就是過敏警示
          if (food.allergy) foodStats[fName].allergy = true;
        });
      });
    }
  }

  // === 切換分頁邏輯 ===
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    document.getElementById('nav-' + tabId).classList.add('active');
    if(tabId === 'stats') renderStats();
  }

  // === 月曆渲染邏輯 ===
  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthYear').innerText = `${year}年 ${month + 1}月`;
    const firstDayIndex = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();
    const calDays = document.getElementById('calDays');
    calDays.innerHTML = '';
    
    for (let i = 0; i < firstDayIndex; i++) { calDays.innerHTML += `<div></div>`; }
    
    for (let i = 1; i <= lastDay; i++) {
      let isToday = (i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) ? 'today' : '';
      let isSelected = (i === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear()) ? 'selected' : '';
      
      let dateKey = `${year}-${(month + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
      let foodTagsHTML = '';
      
      if (foodRecords[dateKey]) {
        let uniqueFoods = [];
        let seen = new Set();
        foodRecords[dateKey].forEach(m => m.foods.forEach(f => {
          if(!seen.has(f.name) && f.name.trim() !== "") { seen.add(f.name); uniqueFoods.push(f.name); }
        }));
        
        // 【願望2解決】排序優先顯示「第一次接觸」的新食物
        uniqueFoods.sort((a, b) => {
          let aIsNew = foodStats[a].firstDate === dateKey ? 1 : 0;
          let bIsNew = foodStats[b].firstDate === dateKey ? 1 : 0;
          return bIsNew - aIsNew; // 讓是初次體驗的排前面
        });
        
        let foodsToDisplay = uniqueFoods.slice(0, 2); 
        foodsToDisplay.forEach(fName => {
          let isNewFood = foodStats[fName].firstDate === dateKey;
          let markNew = isNewFood ? ' new-food' : ''; // 新食物加粗橘色樣式
          let prefix = isNewFood ? '✨' : '';
          foodTagsHTML += `<div class="food-tag${markNew}">${prefix}${fName}</div>`;
        });
        if (uniqueFoods.length > 2) foodTagsHTML += `<div class="food-tag">...</div>`;
      }

      const dayDiv = document.createElement('div');
      dayDiv.className = `cal-day ${isToday} ${isSelected}`;
      dayDiv.innerHTML = `<span>${i}</span>${foodTagsHTML}`;
      dayDiv.onclick = () => selectDate(year, month, i);
      calDays.appendChild(dayDiv);
    }
  }

  function changeMonth(step) {
    currentDate.setMonth(currentDate.getMonth() + step);
    renderCalendar();
  }

  // === 編輯當日紀錄邏輯 (願望1解決) ===
  function selectDate(year, month, day) {
    selectedDate = new Date(year, month, day);
    renderCalendar();
    
    let dateKey = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
    document.getElementById('displayDate').innerText = `【 ${dateKey} 】`;

    // 載入當天舊資料進陣列，準備編輯
    currentDayMealsData = [];
    if (foodRecords[dateKey]) {
      // 深拷貝，以免直接改到全域變數
      currentDayMealsData = JSON.parse(JSON.stringify(foodRecords[dateKey]));
    }
    
    if(currentDayMealsData.length === 0) {
       // 如果這天沒紀錄，預設給一餐空白的
       currentDayMealsData.push({ time: "12:00", foods: [{ name: "", allergy: false }] });
    }
    renderMealsEditor();
  }

  function generateTimeOptions(selectedTime) {
    let options = '';
    for (let h = 8; h <= 21; h++) {
      let hStr = h.toString().padStart(2, '0');
      let t1 = `${hStr}:00`; let t2 = `${hStr}:30`;
      options += `<option value="${t1}" ${selectedTime==t1?'selected':''}>${t1}</option>`;
      options += `<option value="${t2}" ${selectedTime==t2?'selected':''}>${t2}</option>`;
    }
    return options;
  }

  // 將 currentDayMealsData 畫到畫面上
  function renderMealsEditor() {
    const container = document.getElementById('mealsContainer');
    container.innerHTML = '';
    
    currentDayMealsData.forEach((meal, mealIndex) => {
      let mealDiv = document.createElement('div');
      mealDiv.className = 'meal-block';
      
      let foodsHTML = '';
      meal.foods.forEach((food, foodIndex) => {
        let allergyActive = food.allergy ? 'active' : '';
        foodsHTML += `
          <div class="input-group">
            <input type="text" placeholder="食物名稱" value="${food.name}" onchange="updateFood(${mealIndex}, ${foodIndex}, 'name', this.value)">
            <button class="btn-action btn-allergy ${allergyActive}" onclick="toggleAllergy(${mealIndex}, ${foodIndex})" title="標記過敏">⚠️</button>
            <button class="btn-action" onclick="removeFood(${mealIndex}, ${foodIndex})" style="color:#D9534F;" title="刪除此項">✖</button>
          </div>
        `;
      });

      mealDiv.innerHTML = `
        <div class="meal-header">
          <select onchange="updateTime(${mealIndex}, this.value)">${generateTimeOptions(meal.time)}</select>
          <button class="btn-remove-meal" onclick="removeMealBlock(${mealIndex})">刪除此餐</button>
        </div>
        <div>${foodsHTML}</div>
        <button class="btn-add-food" onclick="addFoodField(${mealIndex})">+ 新增食物</button>
      `;
      container.appendChild(mealDiv);
    });
  }

  // 陣列操作函式 (編輯同步)
  function updateTime(mIdx, val) { currentDayMealsData[mIdx].time = val; }
  function updateFood(mIdx, fIdx, key, val) { currentDayMealsData[mIdx].foods[fIdx][key] = val; }
  function toggleAllergy(mIdx, fIdx) { 
    currentDayMealsData[mIdx].foods[fIdx].allergy = !currentDayMealsData[mIdx].foods[fIdx].allergy; 
    renderMealsEditor(); // 重新渲染更新⚠️圖示
  }
  function addFoodField(mIdx) { 
    currentDayMealsData[mIdx].foods.push({name: "", allergy: false}); 
    renderMealsEditor(); 
  }
  function removeFood(mIdx, fIdx) { 
    currentDayMealsData[mIdx].foods.splice(fIdx, 1); 
    renderMealsEditor(); 
  }
  function addMealBlock() { 
    currentDayMealsData.push({ time: "12:00", foods: [{ name: "", allergy: false }] }); 
    renderMealsEditor(); 
  }
  function removeMealBlock(mIdx) { 
    currentDayMealsData.splice(mIdx, 1); 
    renderMealsEditor(); 
  }

  // === 儲存功能 (送出整天的資料覆蓋) ===
  function submitData() {
    const dateText = document.getElementById('displayDate').innerText.replace('【 ', '').replace(' 】', '');
    
    // 過濾掉空白的食物欄位
    let cleanMeals = [];
    currentDayMealsData.forEach(meal => {
       let validFoods = meal.foods.filter(f => f.name.trim() !== "");
       if(validFoods.length > 0) cleanMeals.push({ time: meal.time, foods: validFoods });
    });

    if(cleanMeals.length === 0) {
       // 如果當天清空了，理論上可以送空陣列去清掉表格資料，但這裡防呆先要求至少有一項
       alert("最少要留一項食物紀錄喔！若要清空請直接在 Google 表單刪除該列。"); return;
    }

    document.getElementById('loading').style.display = 'flex';

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ date: dateText, meals: cleanMeals })
    })
    .then(r => r.json())
    .then(data => {
      if(data.status === "success") {
        alert("當日紀錄已更新！子淇媽咪辛苦了 🥰");
        fetchHistoryData(); // 重新抓資料重算統計
      } else { alert("儲存失敗：" + data.message); document.getElementById('loading').style.display='none'; }
    }).catch(err => { alert("錯誤：" + err); document.getElementById('loading').style.display='none'; });
  }

  // === 渲染統計分頁 (願望3解決) ===
  function renderStats() {
    let foodNames = Object.keys(foodStats);
    let totalKinds = foodNames.length;
    
    // 圓環進度條動畫
    let percent = Math.min((totalKinds / 100) * 100, 100);
    document.getElementById('progressRing').style.background = `conic-gradient(var(--primary-color) ${percent}%, #E0E0E0 0%)`;
    document.getElementById('progressNum').innerText = totalKinds;

    // 依照吃過的次數排序
    foodNames.sort((a, b) => foodStats[b].count - foodStats[a].count);

    let listContainer = document.getElementById('statsListContainer');
    listContainer.innerHTML = '';
    
    foodNames.forEach(fName => {
      let stat = foodStats[fName];
      let allergyMark = stat.allergy ? '<span style="color:var(--danger-color)">⚠️過敏</span>' : '';
      let isAllergyClass = stat.allergy ? 'allergy' : '';
      
      listContainer.innerHTML += `
        <div class="stat-item ${isAllergyClass}">
          <div>
            <div style="font-weight:bold;">${fName}</div>
            <div style="font-size:0.75rem; color:#888;">吃過 ${stat.count} 次</div>
          </div>
          <div>${allergyMark}</div>
        </div>
      `;
    });
    
    if(totalKinds === 0) {
      listContainer.innerHTML = `<div style="grid-column: span 2; text-align:center; color:#999; margin-top:20px;">還沒有紀錄唷，趕快開始挑戰吧！</div>`;
    }
  }

  window.onload = fetchHistoryData;
</script>
</body>
</html>
